<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>КП по статусам</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard.css?v=3">
</head>
<body>
  <main class="dashboard-shell">
    <section id="newRequestPanel" class="request-panel" hidden>
      <div class="request-panel__header">
        <strong>Новый запрос клиента</strong>
        <button id="closeRequestPanelBtn" type="button" class="close-panel-btn">&times;</button>
        <p>Введите данные в свободной форме. По кнопке Отправить будет создано новое КП в 1С.</p>
      </div>
      <label class="request-panel__field" for="requestTextInput">Текст запроса</label>
      <textarea id="requestTextInput" rows="7" placeholder="Пример: Клиент: ООО Альфа. Нужны шины ..."></textarea>
      <div class="request-panel__actions">
        <button id="submitRequestBtn" type="button" class="primary-button">ОТПРАВИТЬ</button>
      </div>
      <p id="requestStatusMsg" class="request-panel__status" aria-live="polite"></p>
    </section>

    <section class="status-toolbar" aria-label="Закладки по статусам">
      <div id="statusTabs" class="status-tabs"></div>
    </section>

    <header class="dashboard-topbar">
      <div class="topbar-actions">
        <span id="updatedAtLabel" class="updated-at-inline">Загрузка...</span>
        <label class="search-box" aria-label="Поиск по КП">
          <input id="searchInput" type="text" placeholder="ПОИСК">
          <button id="clearSearchBtn" type="button" class="search-clear-btn" hidden>ОЧИСТИТЬ</button>
        </label>
        <label class="manager-filter" aria-label="Фильтр по менеджеру">
          <select id="managerFilter">
            <option value="">Все менеджеры</option>
          </select>
        </label>
        <button id="refreshBtn" type="button" class="ghost-button">ОБНОВИТЬ ИЗ 1С</button>
        <button id="newRequestBtn" type="button" class="ghost-button">НОВЫЙ ЗАПРОС</button>
        <button id="themeBtn" type="button" class="ghost-button">Тёмный фон</button>
        <a id="logoutLink" class="ghost-button logout-button" href="/logout">ВЫЙТИ</a>
      </div>
    </header>

    <section class="dashboard-board">
      <div id="boardContent" class="board-content">
        <div class="board-empty">Загрузка...</div>
      </div>
    </section>
  </main>

  <script src="/dashboard.js?v=6"></script>
</body>
</html>

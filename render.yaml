services:
  - type: web
    name: onec-kp-realtime
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn api_proxy:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: ODATA_BASE_URL
        sync: false
      - key: ODATA_USERNAME
        sync: false
      - key: ODATA_PASSWORD
        sync: false
      - key: ODATA_ENTITY
        value: Document_КоммерческоеПредложениеКлиенту
      - key: REFRESH_SECONDS
        value: "60"
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_SERVICE_NAME
        value: onec-kp-realtime

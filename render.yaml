services:
  - type: web
    name: onec-kp-realtime
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn api_proxy:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: ODATA_BASE_URL
        sync: false
      - key: ODATA_USERNAME
        sync: false
      - key: ODATA_PASSWORD
        sync: false
      - key: ODATA_ENTITY
        value: Document_КоммерческоеПредложениеКлиенту
      - key: REFRESH_SECONDS
        value: "60"
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_SERVICE_NAME
        value: onec-kp-realtime
      - key: RENDER_EXTERNAL_URL
        value: https://onec-kp-realtime.onrender.com
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: pavel9619229-cmyk/KP
      - key: GITHUB_BRANCH
        value: main
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false

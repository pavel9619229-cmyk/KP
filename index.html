<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Коммерческие предложения — март 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <main class="container">
    <header class="hero">
      <h1>КП · март-апрель 2026</h1>
    </header>

    <section class="controls" aria-label="Фильтры">
      <label>
        <input id="searchInput" type="text" placeholder="Номер, статус или текст..." aria-label="Поиск">
      </label>
      <label>
        <select id="statusFilter" aria-label="Статус">
          <option value="">Все</option>
        </select>
      </label>
      <button id="resetBtn" type="button">Сбросить</button>
      <button id="darkBtn" type="button">🌙 Тёмный фон</button>
    </section>

    <section class="panel">
      <div class="panel-top">
        <strong id="countLabel">Загрузка...</strong>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>№ КП</th>
              <th>Дата создания</th>
              <th>Клиент</th>
              <th>Клиент заполнен</th>
              <th>Менеджер заполнен</th>
              <th>Товар указан</th>
              <th>КП отправлено</th>
              <th>Получение подтвер-ждено</th>
              <th>Оплата получена</th>
              <th>Накладная создана</th>
              <th>В ЭДО отправлено</th>
              <th>Отказ</th>
              <th>Проблема</th>
              <th>Статус</th>
              <th>Первая строка доп. информации</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js?v=3"></script>
</body>
</html>
